<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SubAlly Support</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(180deg, #f8fafc 0%, #e2e8f0 100%);
      color: #1e293b;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      width: 100%;
      max-width: 500px;
    }
    
    .header {
      text-align: center;
      margin-bottom: 40px;
    }
    
    .logo {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }
    
    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 20px;
      color: white;
    }
    
    .logo-text {
      font-size: 24px;
      font-weight: bold;
    }
    
    h1 {
      font-size: 28px;
      margin-bottom: 8px;
    }
    
    .subtitle {
      color: #64748b;
      font-size: 14px;
    }
    
    .box {
      background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 32px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.07);
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #1e293b;
    }
    
    input, select, textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      background: #ffffff;
      color: #1e293b;
      font-size: 14px;
      font-family: inherit;
    }
    
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #0284c7;
      box-shadow: 0 0 0 3px rgba(2, 132, 199, 0.1);
    }
    
    textarea {
      resize: vertical;
      min-height: 120px;
    }
    
    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }
    
    button:hover {
      transform: translateY(-2px);
    }
    
    button:disabled {
      background: linear-gradient(135deg, #cbd5e1 0%, #94a3b8 100%);
      cursor: not-allowed;
      transform: none;
    }
    
    .message {
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }
    
    .message.success {
      background: linear-gradient(135deg, #dcfce7 0%, #bbf7d0 100%);
      color: #166534;
      border: 1px solid #86efac;
      display: block;
    }
    
    .message.error {
      background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%);
      color: #991b1b;
      border: 1px solid #fca5a5;
      display: block;
    }
    
    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: #64748b;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">
        <img style="width: 100px; height: 100px; border-radius: 15px" src="logo.png" alt="Biobodinc Logo" class="logo-icon">
        <br>
        <br>
        <div class="logo-text">Biobodinc</div>
      </div>
      <h1>Support</h1>
      <p class="subtitle">We're here to help. Send us a message.</p>
    </div>
    
    <div class="box">
      <form id="contactForm" >
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required>
        </div>
        
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>
        </div>
        
        <div class="form-group">
          <label for="category">Which service?</label>
          <select id="category" name="category" required>
            <option value="">Select a service</option>
            <option value="BioBod.net">BioBod.net</option>
            <option value="SubAlly">SubAlly</option>
            <option value="B&K General Services">B&K General Services</option>
          </select>
        </div>
        
        <div class="form-group">
          <label for="subject">Subject</label>
          <input type="text" id="subject" name="subject" required>
        </div>
        
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" required></textarea>
        </div>
        
        <button type="submit" id="submitBtn">Send support request</button>
        
        <div id="message" class="message"></div>
      </form>
    </div>
    
    <div class="footer">
      <p>We'll respond within 24 hours</p>
    </div>
  </div>
  
  <script>
    const form = document.getElementById('contactForm');
    const messageDiv = document.getElementById('message');
    const submitBtn = document.getElementById('submitBtn');
    
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      messageDiv.textContent = '';
      messageDiv.className = 'message';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending...';
      
      const formData = new FormData(form);
      
      try {
        const response = await fetch('https://formspree.io/f/mbdvoqzo', {
          method: 'POST',
          body: formData,
          headers: {
            'Accept': 'application/json'
          }
        });
        
        if (response.ok) {
          messageDiv.textContent = 'Success! We got your message. We\'ll respond within 24 hours.';
          messageDiv.className = 'message success';
          form.reset();
        } else {
          messageDiv.textContent = 'Failed to send message. Please try again.';
          messageDiv.className = 'message error';
        }
      } catch (error) {
        messageDiv.textContent = 'Network error. Please try again.';
        messageDiv.className = 'message error';
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Send support request';
      }
    });
  </script>
  <!-- Google -->
   <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSdHREqcJ5rX7iwJ9pa-y3XG9hsr_kgLKPg1aiwwJa_PG5ZLTA/viewform?embedded=true" width="640" height="1028" frameborder="0" marginheight="0" marginwidth="0">Loading…</iframe>
</body>
</html>
